name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            name: macos-x86_64
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            name: macos-aarch64
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            name: windows-x86_64
            target: x86_64-pc-windows-msvc
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev libgl1-mesa-dev libegl1-mesa-dev libxrandr-dev libxi-dev libxcursor-dev libfontconfig-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        timeout-minutes: 30

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          mv sudoku${{ matrix.ext }} sudoku-${{ matrix.name }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sudoku-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/sudoku-${{ matrix.name }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sudoku ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*
